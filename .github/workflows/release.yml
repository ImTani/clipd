name: Release

# Cut a PUBLIC, SOURCE-ONLY release when a version tag is pushed
# (`git tag v0.1.0 && git push --tags`).
#
# DISTRIBUTION MODEL (SECURITY.md / CONTRIBUTING.md / DECISIONS.md 2026-07-11):
# the SOURCE is free software (GPL-3.0) and IS published; the COMPILED BINARY
# "may be sold" to fund the project, so it is NOT published here. The friends
# build is produced LOCALLY with `just dist` and handed out directly — CI never
# builds or touches the binary.
#
# This workflow only creates the GitHub Release for the tag; GitHub automatically
# attaches the "Source code (zip)" / "(tar.gz)" archives, which is exactly what
# the README points people to. No compilation, no binary asset.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required for `gh release create` to create the Release

jobs:
  release:
    name: source-only release
    runs-on: ubuntu-latest # no build needed — a source-only Release
    steps:
      # fetch-depth: 0 so --generate-notes can see prior tags for the changelog.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # No files are passed, so nothing but GitHub's auto-attached source
      # archive(s) appears on the Release. --generate-notes writes the changelog
      # from commits/PRs since the last tag. `gh` is preinstalled on the runner.
      - name: Create source-only GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${{ github.ref_name }}"
          --verify-tag
          --generate-notes
          --title "clipd ${{ github.ref_name }}"
